server:
  port: 8084

spring:
  application:
    name: inventory-service
  threads:
    virtual:
      enabled: true
  data:
    cassandra:
      keyspace-name: ecommerce_inventory
      contact-points: cassandra
      port: 9042
      local-datacenter: datacenter1
      schema-action: CREATE_IF_NOT_EXISTS
    redis:
      host: redis
      port: 6379
      password: ${REDIS_PASSWORD:redis_secret}
  kafka:
    bootstrap-servers: kafka:29092
    consumer:
      group-id: inventory-service-group
      auto-offset-reset: earliest
    producer:
      acks: all
      retries: 3

redisson:
  lock:
    watchdog-timeout: 30000
    lease-time: 10000

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus,metrics
  tracing:
    sampling:
      probability: 1.0
