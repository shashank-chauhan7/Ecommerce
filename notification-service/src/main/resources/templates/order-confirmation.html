<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title>Order Confirmation</title>
</head>
<body style="margin: 0; padding: 0; background-color: #f4f4f4; font-family: Arial, Helvetica, sans-serif;">
<table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f4f4f4; padding: 20px 0;">
    <tr>
        <td align="center">
            <table role="presentation" width="600" cellpadding="0" cellspacing="0" style="background-color: #ffffff; border-radius: 8px; overflow: hidden;">
                <!-- Header -->
                <tr>
                    <td style="background-color: #2c3e50; padding: 30px; text-align: center;">
                        <h1 style="color: #ffffff; margin: 0; font-size: 24px;">Order Confirmed!</h1>
                    </td>
                </tr>
                <!-- Body -->
                <tr>
                    <td style="padding: 30px;">
                        <p style="color: #333333; font-size: 16px; margin-top: 0;">
                            Thank you for your order! We're excited to get your items on their way.
                        </p>

                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="background-color: #f9f9f9; border-radius: 6px; padding: 20px; margin: 20px 0;">
                            <tr>
                                <td>
                                    <p style="margin: 0 0 8px 0; color: #666666; font-size: 14px;">Order Number</p>
                                    <p style="margin: 0; color: #2c3e50; font-size: 18px; font-weight: bold;" th:text="${orderId}">ORD-001</p>
                                </td>
                            </tr>
                        </table>

                        <div th:if="${items}" style="margin: 20px 0;">
                            <h3 style="color: #2c3e50; border-bottom: 2px solid #eee; padding-bottom: 10px;">Order Items</h3>
                            <p th:text="${items}" style="color: #555555; font-size: 14px;">Item details</p>
                        </div>

                        <table role="presentation" width="100%" cellpadding="0" cellspacing="0" style="margin: 20px 0;">
                            <tr th:if="${total}">
                                <td style="padding: 10px 0; border-top: 2px solid #2c3e50;">
                                    <strong style="color: #2c3e50; font-size: 18px;">Total:</strong>
                                </td>
                                <td style="padding: 10px 0; border-top: 2px solid #2c3e50; text-align: right;">
                                    <strong style="color: #2c3e50; font-size: 18px;" th:text="${total}">$0.00</strong>
                                </td>
                            </tr>
                        </table>

                        <div th:if="${shippingAddress}" style="margin: 20px 0;">
                            <h3 style="color: #2c3e50;">Shipping Address</h3>
                            <p th:text="${shippingAddress}" style="color: #555555; font-size: 14px;">Address</p>
                        </div>

                        <p style="color: #666666; font-size: 14px;">
                            We'll send you another email when your order ships.
                        </p>
                    </td>
                </tr>
                <!-- Footer -->
                <tr>
                    <td style="background-color: #f9f9f9; padding: 20px; text-align: center; border-top: 1px solid #eeeeee;">
                        <p style="color: #999999; font-size: 12px; margin: 0;">
                            &copy; 2026 E-Commerce Platform. All rights reserved.
                        </p>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
