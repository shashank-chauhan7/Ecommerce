apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-recommendation-service
  namespace: ecommerce
  labels:
    app: ai-recommendation-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-recommendation-service
  template:
    metadata:
      labels:
        app: ai-recommendation-service
    spec:
      containers:
        - name: ai-recommendation-service
          image: ecommerce/ai-recommendation-service:latest
          ports:
            - containerPort: 8089
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: k8s
            - name: SPRING_CONFIG_IMPORT
              value: configserver:http://config-server:8888
          envFrom:
            - configMapRef:
                name: ecommerce-config
            - secretRef:
                name: ecommerce-secrets
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 500m
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8089
            initialDelaySeconds: 60
            periodSeconds: 30
